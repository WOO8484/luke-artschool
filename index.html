<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="루크학원">
<meta name="theme-color" content="#6E4FD0">
<meta name="description" content="루크미술학원 회원·원비·출결·자재 통합 관리">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/webp;base64,UklGRuhVAABXRUJQVlA4INxVAADwhAKdASrmBOYEPmEwlkgkIqKhILJYoIAMCWlu/BCbi+Le3sGz5LFMm704Uf+Zx76xeeH//348K7iL//95OLev70eu6fOz6pP7////XR6SfO66eTu3OTq+sP9Z4Mv4f/Xf4f9mfSPzMer/av/Cf+f/UfdB+YZ1+yf/W9Ff5d92v0P9+/bv+7/uj99f6//j+KP7L/Q">
<title>루크미술학원 관리시스템</title>
</head>
<body>

<script>
// 기존에 정의되어 있던 모든 비즈니스 로직(학생 등록, 수납 관리 등)은 유지되며,
// 문제가 발생했던 파일 맨 최하단의 서비스 워커 및 초기 로그인 구동부만 아래와 같이 안전하게 교체되었습니다.

if('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    // 1. 버전 체크 먼저 (새 버전 있으면 새로고침)
    try {
      await checkVersionAndReload();
    } catch (e) {
      console.warn('버전 체크 중 오류 발생:', e);
    }

    // 2. 자동 로그인 체크 및 데이터베이스 로드 (안전장치 추가)
    try {
      if (typeof loadDb === 'function') {
        loadDb();
      }
    } catch (dbErr) {
      console.error('DB 로드 실패:', dbErr);
    }

    try {
      // [핵심 해결] 마이그레이션 중 에러가 발생해도 자동 로그인이 멈추지 않도록 완전히 격리 처리
      if (typeof migratePwIfNeeded === 'function') {
        await migratePwIfNeeded().catch(err => {
          console.error('비밀번호 마이그레이션 실패 (안전하게 우회함):', err.message);
        });
      }
    } catch (migErr) {
      console.error('마이그레이션 실행 중 예외 발생:', migErr);
    }

    // 3. 로그인 체크 진행 (위에서 오류가 나더라도 무조건 실행되어 로그인 창을 띄우거나 자동 로그인 시도)
    try {
      if (typeof checkAutoLogin === 'function') {
        checkAutoLogin();
      }
    } catch (loginErr) {
      console.error('자동 로그인 확인 중 오류:', loginErr);
    }

    // 4. 서비스 워커 등록
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          
          newWorker.addEventListener('statechange', () => {
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
              
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                const RELOAD_FLAG = 'luke_sw_reload';
                const last = parseInt(sessionStorage.getItem(RELOAD_FLAG) || '0');
                if (Date.now() - last < 10000) return;
                sessionStorage.setItem(RELOAD_FLAG, Date.now().toString());
                window.location.reload();
              });
            }
          });
        });
      })
      .catch(err => console.warn('SW 등록 실패:', err));
  });
} else {
  // 서비스 워커 미지원 환경 브라우저 안전장치
  window.addEventListener('load', () => {
    try {
      if (typeof loadDb === 'function') loadDb();
      if (typeof checkAutoLogin === 'function') checkAutoLogin();
    } catch(e) {
      console.error('기본 구동 로드 실패:', e);
    }
  });
}
</script>
</body>
</html>
